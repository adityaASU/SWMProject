llm:
  backend: gemini          # "gemini" | "ollama"
  gemini_model: gemini-2.0-flash-lite
  ollama_model: llama3
  ollama_base_url: http://localhost:11434
  temperature: 0.0
  max_tokens: 2048

paths:
  spider_data: data/spider
  cosql_data: data/cosql
  custom_data: data/custom
  results_dir: results

benchmark:
  max_examples: null        # null = all; set integer to limit (useful for quick runs)
  timeout_seconds: 30       # per-query SQL execution timeout
  parallel_workers: 1

evaluation:
  compute_exact_match: true
  compute_execution_accuracy: true
  compute_failure_modes: true
  compute_explainability: true
